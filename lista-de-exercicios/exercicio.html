<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quartel de Treino - Discipline RPG</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container-treino {
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }

   /* CARD DE STATUS DO GUERREIRO (RPG) */
    .status-card {
      background: linear-gradient(135deg, #14141a, #1f1f2e);
      border: 1px solid #33334d;
      border-radius: 12px;
      padding: 15px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-info h3 {
      margin: 0 0 5px 0;
      font-size: 1.1rem;
      color: #00ffcc;
    }

    .status-info p {
      margin: 0;
      font-size: 0.85rem;
      color: #aaa;
    }

    /* BARRA DE XP CIRCULAR */
    .circular-progress {
      position: relative;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: conic-gradient(#00ffcc 0deg, #222 0deg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .circular-progress::before {
      content: "";
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #14141a;
    }

    .progress-value {
      position: relative;
      font-size: 0.8rem;
      font-weight: bold;
      color: #00ffcc;
    }

    /* CRONÔMETRO DE DESCANSO TÁTICO */
    .cronometro-box {
      background: #121218;
      border: 1px solid #2a2a3d;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      margin-bottom: 20px;
    }

    .cronometro-display {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffc107;
      font-family: monospace;
      margin: 5px 0;
    }

    .btn-timer {
      background: #2a2a3d;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .btn-timer:hover {
      background: #3a3a5c;
    }

    /* Seletor dos Dias da Semana */
    .dias-semana-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px;
      margin: 20px 0;
    }

    .btn-dia {
      background: #141414;
      border: 1px solid #222;
      color: #888;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
    }

    .btn-dia:hover {
      border-color: #00ffcc;
      color: #fff;
    }

    .btn-dia.ativo {
      background: rgba(0, 255, 204, 0.15);
      border-color: #00ffcc;
      color: #00ffcc;
    }

    /* Cards de Exercícios da Lista */
    .exercicio-card-lista {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .exercicio-info h4 {
      color: #fff;
      margin: 0 0 5px 0;
      font-size: 1rem;
    }

    .exercicio-info p {
      color: #888;
      margin: 0;
      font-size: 0.85rem;
    }

    .btn-executar {
      background: #00ffcc;
      color: #000;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .btn-executar:hover {
      background: #00cca3;
    }

    .descanso-msg {
      text-align: center;
      padding: 40px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="container-treino">
    <a href="../index.html" style="color: #888; text-decoration: none; font-size: 0.9rem;">⬅ Voltar ao Dashboard</a>

    <div style="margin-top: 15px; margin-bottom: 20px;">
      <h2 style="color: #fff; border-left: 3px solid #00ffcc; padding-left: 10px; margin: 0;">Quartel do Guerreiro</h2>
      <p style="color: #888; margin-top: 5px; font-size: 0.9rem;">Selecione o dia da semana para visualizar suas missões de treino.</p>
    </div>

   <!-- PAINEL DE STATUS DO HERÓI -->
    <div class="status-card">
      <div class="status-info">
        <h3 id="rpg-titulo-classe">🛡️ GUERREIRO EM BATALHA</h3>
        <p id="rpg-texto-status">Carregando dados de XP...</p>
      </div>
      <div class="circular-progress" id="circulo-progresso">
        <div class="progress-value" id="texto-porcentagem">0%</div>
      </div>
    </div>

    <!-- CRONÔMETRO DE DESCANSO TÁTICO -->
    <div class="cronometro-box">
      <span style="font-size: 0.8rem; color: #aaa; text-transform: uppercase;">⏱️ Descanso entre Séries</span>
      <div class="cronometro-display" id="display-tempo">01:30</div>
      <div>
        <button class="btn-timer" onclick="iniciarCronometro()">Iniciar (90s)</button>
        <button class="btn-timer" onclick="zerarCronometro()">Zerar</button>
      </div>
    </div>

    <!-- DIAS DA SEMANA -->
    <div class="dias-semana-grid">
      <div class="btn-dia ativo" onclick="selecionarDia('segunda', this)">Segunda (A)</div>
      <div class="btn-dia" onclick="selecionarDia('terca', this)">Terça (B)</div>
      <div class="btn-dia" onclick="selecionarDia('quarta', this)">Quarta (C)</div>
      <div class="btn-dia" onclick="selecionarDia('quinta', this)">Quinta (A)</div>
      <div class="btn-dia" onclick="selecionarDia('sexta', this)">Sexta (B)</div>
      <div class="btn-dia" onclick="selecionarDia('sabado', this)">Sábado (C)</div>
      <div class="btn-dia" onclick="selecionarDia('domingo', this)">Domingo</div>
    </div>

    <!-- LISTA DE EXERCÍCIOS DO DIA -->
    <div id="container-exercicios-dia">
      <!-- Preenchido via JavaScript -->
    </div>
  </div>

  <script>
    // Configuração atualizada dos treinos por dia da semana baseada no planejamento estratégico
    const agendaTreinos = {
      segunda: [
        { id: "puxada-alta-aberta", nome: "Puxada Alta (Pegada Aberta Pronada)", grupo: "Costas (Largura) • 4x 8-10 reps", xp: 50 },
        { id: "puxada-neutra", nome: "Puxada Neutra (Triângulo) / Pulldown Articulado", grupo: "Costas (Alongamento) • 3x 10 reps", xp: 45 },
        { id: "remada-baixa-supinada", nome: "Remada Baixa no Cabo (Supinada)", grupo: "Costas (Miolo) • 3x 10 reps", xp: 45 },
        { id: "pulldown-bracos-estendidos", nome: "Pulldown com Barra no Pulley", grupo: "Costas (Isolamento) • 3x 12 reps", xp: 40 },
        { id: "rosca-martelo", nome: "Rosca Martelo", grupo: "Bíceps / Antebraço • 3x 10-12 reps", xp: 35 },
        { id: "rosca-scott-concentrada", nome: "Rosca Scott ou Concentrada", grupo: "Bíceps • 3x 10 reps", xp: 35 }
      ],
      terca: [
        { id: "agachamento", nome: "Agachamento (Livre ou Hack)", grupo: "Pernas • 4x 6-8 reps", xp: 60 },
        { id: "leg-press", nome: "Leg Press", grupo: "Pernas • 3x 10-12 reps", xp: 50 },
        { id: "cadeira-extensora", nome: "Cadeira Extensora", grupo: "Pernas (Falha Metabólica) • 3x 12-15 reps", xp: 45 },
        { id: "mesa-flexora", nome: "Mesa Flexora ou Cadeira Flexora", grupo: "Posteriores • 4x 10-12 reps", xp: 45 },
        { id: "gemeos", nome: "Gêmeos Sentado ou Em Pé", grupo: "Panturrilha • 4x 15 reps", xp: 35 }
      ],
      quarta: [
        { id: "descanso", nome: "Descanso Total e Recuperação", grupo: "Recuperação Mental e Física", xp: 0 }
      ],
      quinta: [
        { id: "remada-curvada", nome: "Remada Curvada com Barra", grupo: "Costas (Força Bruta) • 4x 6-8 reps", xp: 55 },
        { id: "remada-cavalinho", nome: "Remada Cavalinho ou T na Máquina", grupo: "Costas (Miolo) • 3x 10 reps", xp: 45 },
        { id: "remada-unilateral", nome: "Remada Unilateral com Halter (Serrote)", grupo: "Costas (Assimetrias) • 3x 10 reps", xp: 45 },
        { id: "crucifixo-invertido", nome: "Crucifixo Invertido ou Face Pull", grupo: "Posterior de Ombro • 4x 12-15 reps", xp: 40 },
        { id: "rosca-direta-w", nome: "Rosca Direta (Barra W)", grupo: "Bíceps • 3x 10 reps", xp: 35 }
      ],
      sexta: [
        { id: "supino-inclinado", nome: "Supino Inclinado (Halteres / Articulado)", grupo: "Peitoral Superior • 4x 8-10 reps", xp: 50 },
        { id: "supino-reto", nome: "Supino Reto (Barra ou Máquina)", grupo: "Peitoral • 3x 8-10 reps", xp: 45 },
        { id: "crossover-pec-deck", nome: "Crossover ou Pec Deck (Voador)", grupo: "Peitoral (Esmagamento) • 3x 12 reps", xp: 40 },
        { id: "desenvolvimento-elevacao", nome: "Desenvolvimento com Halteres / Elevação Lateral", grupo: "Ombros (Largura) • 4x 10-12 reps", xp: 40 },
        { id: "triceps-pulley", nome: "Tríceps Pulley (Corda ou Barra)", grupo: "Tríceps • 3x 10-12 reps", xp: 35 },
        { id: "triceps-testa-frances", nome: "Tríceps Testa ou Francês", grupo: "Tríceps • 3x 10 reps", xp: 35 }
      ],
      sabado: [],
      domingo: []
    };

    // Lógica do Cronômetro Regressivo
    let timerInterval = null;
    function iniciarCronometro() {
      clearInterval(timerInterval);
      let tempoRestante = 90; // 90 segundos de descanso padrão
      atualizarDisplayTempo(tempoRestante);

      timerInterval = setInterval(() => {
        tempoRestante--;
        atualizarDisplayTempo(tempoRestante);
        if (tempoRestante <= 0) {
          clearInterval(timerInterval);
          alert("⚔️ Fim do Descanso! Retorne ao campo de batalha!");
        }
      }, 1000);
    }

    function zerarCronometro() {
      clearInterval(timerInterval);
      atualizarDisplayTempo(90);
    }

    function atualizarDisplayTempo(segundos) {
      let min = Math.floor(segundos / 60);
      let seg = segundos % 60;
      document.getElementById("display-tempo").textContent = 
        `${min.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;
    }

    // Selecionar Dia e Atualizar Mural + Barra Circular de Progresso
    function selecionarDia(dia, elementoBt) {
      document.querySelectorAll(".btn-dia").forEach(btn => btn.classList.remove("ativo"));
      elementoBt.classList.add("ativo");

      const container = document.getElementById("container-exercicios-dia");
      const lista = agendaTreinos[dia];

      // Atualiza o Status do Herói no Card Superior com base no LocalStorage
      let dadosRPG = JSON.parse(localStorage.getItem("rpg_dados_completos")) || {
        guerreiro: { level: 1, xp: 0, xpMax: 100 }
      };
      let lvl = dadosRPG.guerreiro.level;
      let xpAtual = dadosRPG.guerreiro.xp;
      let xpMax = dadosRPG.guerreiro.xpMax;
      let porcentagem = Math.min(100, Math.round((xpAtual / xpMax) * 100));

      document.getElementById("rpg-titulo-classe").textContent = `🛡️ GUERREIRO (LVL ${lvl})`;
      document.getElementById("rpg-texto-status").textContent = `Progresso de XP: ${xpAtual} / ${xpMax} (${porcentagem}%)`;
      
      // Atualiza visual da barra circular
      const circulo = document.getElementById("circulo-progresso");
      circulo.style.background = `conic-gradient(#00ffcc ${porcentagem * 3.6}deg, #222 0deg)`;
      document.getElementById("texto-porcentagem").textContent = `${porcentagem}%`;

      if (!lista || lista.length === 0) {
        container.innerHTML = `
          <div class="descanso-msg">
            <h3>🛡️ Santuário de Descanso (Rest Day)</h3>
            <p>O Guerreiro descansa hoje para regenerar sua Vitalidade.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = "";
      lista.forEach(ex => {
        container.innerHTML += `
          <div class="exercicio-card-lista">
            <div class="exercicio-info">
              <h4>${ex.nome}</h4>
              <p>Atributo: ${ex.grupo} • Recompensa: +${ex.xp} XP</p>
            </div>
            <a href="detalhe.html?id=${ex.id}" class="btn-executar">Atacar ⚔️</a>
          </div>
        `;
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      selecionarDia('segunda', document.querySelector('.btn-dia'));
    });
  </script>

</body>
</html>
