<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quartel de Missões • Detalhes do Exercício</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container { width: 100%; max-width: 600px; }

    .status-card, .timer-card, .content-box {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .status-level { background-color: var(--accent-color); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
    .xp-bar-container { width: 100%; background-color: var(--border); border-radius: 8px; height: 12px; overflow: hidden; margin-top: 8px; }
    .xp-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); width: 0%; transition: width 0.4s ease; }
    .xp-text { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; text-align: right; }

    .timer-card { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
    .timer-display { font-size: 1.5rem; font-weight: bold; font-family: monospace; color: var(--success); }
    .btn-timer { background-color: var(--accent-color); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn-timer:hover { background-color: var(--accent-hover); }

    .exercise-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 4px; }
    .exercise-meta { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px; }

    .visual-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
    
    .visual-card { background-color: #0f172a; border: 1px solid var(--border); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .visual-card-title { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .exercise-media { width: 100%; max-height: 250px; object-fit: contain; border-radius: 6px; background-color: rgba(255, 255, 255, 0.02); }

    .section-subtitle { font-size: 1rem; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
    .badges-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    
    .badge-musculo { font-size: 0.85rem; padding: 6px 10px; border-radius: 6px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .badge-musculo.primario { background-color: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
    .badge-musculo.secundario { background-color: rgba(234, 179, 8, 0.15); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.3); }

    .dot-red { display: inline-block; width: 10px; height: 10px; background-color: #ef4444; border-radius: 50%; box-shadow: 0 0 6px rgba(239, 68, 68, 0.6); }
    .dot-yellow { display: inline-block; width: 10px; height: 10px; background-color: #eab308; border-radius: 50%; box-shadow: 0 0 6px rgba(234, 179, 8, 0.6); }

    .analysis-text { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; background-color: rgba(0, 0, 0, 0.2); padding: 12px; border-radius: 8px; }

    .series-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .serie-item { display: flex; justify-content: space-between; align-items: center; background-color: rgba(255, 255, 255, 0.03); padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }
    .check-serie { width: 20px; height: 20px; cursor: pointer; }

    .btn-finalizar { width: 100%; background-color: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: bold; opacity: 0.5; cursor: not-allowed; transition: opacity 0.2s; }
  </style>
</head>
<body>

  <div class="container">
    <!-- STATUS DO GUERREIRO -->
    <div class="status-card">
      <div class="status-header">
        <span style="font-weight: 700;">⚔️ Status do Guerreiro</span>
        <span id="ui-level" class="status-level">Nível 1</span>
      </div>
      <div class="xp-bar-container"><div id="ui-xp-fill" class="xp-bar-fill"></div></div>
      <div id="ui-xp-text" class="xp-text">0 / 100 XP</div>
    </div>

    <!-- CRONÔMETRO -->
    <div class="timer-card">
      <div>
        <div style="font-size: 0.8rem; color: var(--text-muted);">Descanso Tático</div>
        <div id="timer-display" class="timer-display">01:30</div>
      </div>
      <button id="btn-timer-toggle" class="btn-timer" onclick="toggleTimer()">Iniciar Descanso</button>
    </div>

    <!-- CONTEÚDO DO EXERCÍCIO -->
    <div class="content-box">
      <h2 id="ex-nome" class="exercise-title">Nome do Exercício</h2>
      <p id="ex-grupo" class="exercise-meta">Músculo Alvo</p>
      <p id="ex-xp" style="font-size: 0.85rem; color: var(--success); font-weight: bold; margin-bottom: 15px;">+0 XP Recompensa</p>

      <div class="visual-grid">
        <div class="visual-card">
          <span class="visual-card-title">🎬 Demonstração de Execução</span>
          <video id="ex-animacao" class="exercise-media" autoplay loop muted playsinline></video>
        </div>
      </div>

      <h3 class="section-subtitle">Músculos Envolvidos</h3>
      <div id="musculos-primarios" class="badges-container"></div>
      <div id="musculos-secundarios" class="badges-container"></div>

      <h3 class="section-subtitle">Análise Técnica</h3>
      <div id="ex-analise-texto" class="analysis-text">Carregando análise...</div>

      <h3 class="section-subtitle">Controle de Séries</h3>
      <div id="lista-series" class="series-list"></div>

      <button id="btn-finalizar" class="btn-finalizar" onclick="finalizarExercicios()" disabled>Concluir Missão</button>
      
      <div style="margin-top: 15px; text-align: center;">
        <a href="exercicio.html" style="color: var(--accent-color); text-decoration: none; font-size: 0.9rem;">← Voltar para a Agenda</a>
      </div>
    </div>
  </div>
  
<!-- IMPORTANDO O BANCO DE DADOS CORRETO -->
<script src="BDexercicio.js"></script>

  <script>
    let timerInterval = null;
    let tempoRestante = 90;
    let timerRodando = false;

    document.addEventListener("DOMContentLoaded", () => {
      atualizarStatusUI();

      const urlParams = new URLSearchParams(window.location.search);
      let id = urlParams.get("id");

      if (typeof BD_EXERCICIOS === 'undefined') {
        console.error("Erro: O banco de dados BD_EXERCICIOS não foi carregado.");
        return;
      }

      if (!id || !BD_EXERCICIOS[id]) {
        alert("Exercício não encontrado!");
        window.location.href = "exercicio.html";
        return;
      }

      exercicioAtual = BD_EXERCICIOS[id];
      carregarDadosExercicio();
    });

    function atualizarStatusUI() {
      let dadosRPG = JSON.parse(localStorage.getItem("rpg_dados_completos")) || {
        guerreiro: { level: 1, xp: 0, xpMax: 100 }
      };
      let guerreiro = dadosRPG.guerreiro;
      const elLevel = document.getElementById("ui-level");
      if (elLevel) elLevel.textContent = `Nível ${guerreiro.level}`;
      
      const porcentagemXP = (guerreiro.xp / guerreiro.xpMax) * 100;
      const fillBar = document.getElementById("ui-xp-fill");
      if (fillBar) fillBar.style.width = `${Math.min(porcentagemXP, 100)}%`;
      
      const xpText = document.getElementById("ui-xp-text");
      if (xpText) xpText.textContent = `${guerreiro.xp} / ${guerreiro.xpMax} XP`;
    }

    function toggleTimer() {
      const btn = document.getElementById("btn-timer-toggle");
      if (timerRodando) {
        clearInterval(timerInterval);
        timerRodando = false;
        if (btn) {
          btn.textContent = "Retomar";
          btn.style.backgroundColor = "var(--accent-color)";
        }
      } else {
        timerRodando = true;
        if (btn) {
          btn.textContent = "Pausar";
          btn.style.backgroundColor = "var(--danger)";
        }
        timerInterval = setInterval(() => {
          if (tempoRestante > 0) {
            tempoRestante--;
            atualizarDisplayTimer();
          } else {
            clearInterval(timerInterval);
            timerRodando = false;
            alert("⏱️ Fim do Descanso Tático!");
            tempoRestante = 90;
            atualizarDisplayTimer();
            if (btn) {
              btn.textContent = "Iniciar Descanso";
              btn.style.backgroundColor = "var(--accent-color)";
            }
          }
        }, 1000);
      }
    }

    function atualizarDisplayTimer() {
      const min = Math.floor(tempoRestante / 60);
      const sec = tempoRestante % 60;
      const el = document.getElementById("timer-display");
      if (el) el.textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }
  </script>
</body>
</html>
