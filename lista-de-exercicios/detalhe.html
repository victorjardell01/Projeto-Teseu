     ESTRUTURA HTML COMPLETA (detalhes.html)
     ========================================== -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quartel de Missões • Detalhes da Missão</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    /* CARD DE STATUS DO GUERREIRO */
    .status-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .status-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .status-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .status-level {
      background-color: var(--accent-color);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .xp-bar-container {
      width: 100%;
      background-color: var(--border);
      border-radius: 8px;
      height: 12px;
      overflow: hidden;
      margin-top: 8px;
    }

    .xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      width: 0%;
      transition: width 0.4s ease;
    }

    .xp-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: right;
    }

    /* CRONÔMETRO TÁTICO */
    .timer-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .timer-display {
      font-size: 1.5rem;
      font-weight: bold;
      font-family: monospace;
      color: var(--success);
    }

    .btn-timer {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-timer:hover {
      background-color: var(--accent-hover);
    }

    /* CONTEÚDO DE DETALHAMENTO DO EXERCÍCIO */
    .content-box {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .exercise-header {
      margin-bottom: 16px;
    }

    .exercise-title {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .exercise-meta {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* GRID VISUAL: GIF DE EXECUÇÃO + MAPA MUSCULAR DO BONECO */
    .visual-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 480px) {
      .visual-grid {
        grid-template-columns: 1fr;
      }
    }

    .visual-card {
      background-color: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .visual-card-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .exercise-media {
      width: 100%;
      height: 180px;
      object-fit: contain;
      border-radius: 6px;
      background-color: rgba(255, 255, 255, 0.02);
    }

    .section-subtitle {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .badges-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .badge-musculo {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 500;
    }

    .badge-musculo.primario {
      background-color: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.4);
    }

    .badge-musculo.secundario {
      background-color: rgba(234, 179, 8, 0.2);
      color: #fde047;
      border: 1px solid rgba(234, 179, 8, 0.4);
    }

    .analysis-text {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 20px;
      background-color: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 8px;
    }

    /* LISTA DE SÉRIES */
    .series-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .serie-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(255, 255, 255, 0.03);
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .serie-item span {
      font-size: 0.95rem;
    }

    .check-serie {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    /* BOTÃO FINALIZAR */
    .btn-finalizar {
      width: 100%;
      background-color: var(--success);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      opacity: 0.5;
      cursor: not-allowed;
      transition: opacity 0.2s;
    }
  </style>
</head>

        mapaMuscular: "https://images.unsplash.com/photo-1584735935682-2f2b69dff9d2?auto=format&fit=crop&w=400&q=80",
        musculos: { primarios: ["Tríceps Braquial"], secundarios: [] },
        analise: "Abra a corda no final do movimento para contração máxima.",
        series: ["Série 1: 12 reps", "Série 2: 12 reps", "Série 3: 10 reps"]
      },
      "triceps-testa-frances": {
        nome: "Tríceps Testa ou Francês",
        grupo: "Tríceps",
        xp: 35,
        gif: "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=600&q=80",
        mapaMuscular: "https://images.unsplash.com/photo-1584735935682-2f2b69dff9d2?auto=format&fit=crop&w=400&q=80",
        musculos: { primarios: ["Tríceps (Cabeça Longa)"], secundarios: [] },
        analise: "Flexione apenas os cotovelos mantendo os braços firmes.",
        series: ["Série 1: 10 reps", "Série 2: 10 reps", "Série 3: 10 reps"]
      }
    };

    let exercicioAtual = null;
    let timerInterval = null;
    let tempoRestante = 90;
    let timerRodando = false;

    document.addEventListener("DOMContentLoaded", () => {
      atualizarStatusUI();

      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get("id");
      const container = document.getElementById("app-container");

      if (!id || !BD_EXERCICIOS[id]) {
        container.innerHTML = `<p style="color: var(--danger); text-align:center; padding: 20px;">Exercício não encontrado! Verifique se acessou a partir da agenda.</p>`;
        return;
      }

      exercicioAtual = BD_EXERCICIOS[id];
      renderizarDetalhesExercicio(container);
    });

    function atualizarStatusUI() {
      let dadosRPG = JSON.parse(localStorage.getItem("rpg_dados_completos")) || {
        guerreiro: { level: 1, xp: 0, xpMax: 100 }
      };
      let guerreiro = dadosRPG.guerreiro;

      document.getElementById("ui-level").textContent = `Nível ${guerreiro.level}`;
      const porcentagemXP = (guerreiro.xp / guerreiro.xpMax) * 100;
      document.getElementById("ui-xp-fill").style.width = `${Math.min(porcentagemXP, 100)}%`;
      document.getElementById("ui-xp-text").textContent = `${guerreiro.xp} / ${guerreiro.xpMax} XP`;
    }

    function renderizarDetalhesExercicio(container) {
      container.innerHTML = `
        <div class="exercise-header">
          <h2 class="exercise-title">${exercicioAtual.nome}</h2>
          <p class="exercise-meta">Músculo Alvo: ${exercicioAtual.grupo}</p>
          <p style="font-size: 0.85rem; color: var(--success); font-weight: bold; margin-top: 4px;">+${exercicioAtual.xp} XP Recompensa</p>
        </div>

        <!-- DUPLO VISUAL: EXECUÇÃO (GIF) + MAPA DE REGIÕES MUSCULARES -->
        <div class="visual-grid">
          <div class="visual-card">
            <span class="visual-card-title">🎬 Execução</span>
            <img src="${exercicioAtual.gif}" class="exercise-media" alt="Execução do Exercício">
          </div>
          <div class="visual-card">
            <span class="visual-card-title">👤 Regiões Musculares</span>
            <img src="${exercicioAtual.mapaMuscular}" class="exercise-media" alt="Mapa Corporal e Regiões Alvo">
          </div>
        </div>

        <h3 class="section-subtitle">Músculos Envolvidos</h3>
        <div class="badges-container">
          ${exercicioAtual.musculos.primarios.map(m => `<span class="badge-musculo primario">🔴 ${m}</span>`).join("")}
        </div>
        <div class="badges-container">
          ${exercicioAtual.musculos.secundarios.map(m => `<span class="badge-musculo secundario">🟡 ${m}</span>`).join("")}
        </div>

        <h3 class="section-subtitle">Análise Técnica</h3>
        <div class="analysis-text">${exercicioAtual.analise}</div>

        <h3 class="section-subtitle">Controle de Séries</h3>
        <div class="series-list">
          ${exercicioAtual.series.map(textoSerie => `
            <label class="serie-item">
              <span>${textoSerie}</span>
              <input type="checkbox" class="check-serie" onchange="verificarConclusao()">
            </label>
          `).join("")}
        </div>

        <button id="btn-finalizar" class="btn-finalizar" onclick="finalizarExercicio()" disabled>Concluir Missão</button>
        
        <div style="margin-top: 15px; text-align: center;">
          <a href="index.html" style="color: var(--accent-color); text-decoration: none; font-size: 0.9rem;">← Voltar para o Quartel (Agenda)</a>
        </div>
      `;
    }

    function verificarConclusao() {
      const checkboxes = document.querySelectorAll(".check-serie");
      if (checkboxes.length === 0) return;
      
      const todasConcluidas = Array.from(checkboxes).every(cb => cb.checked);
      const btnFinalizar = document.getElementById("btn-finalizar");

      if (btnFinalizar) {
        if (todasConcluidas) {
          btnFinalizar.disabled = false;
          btnFinalizar.style.opacity = "1";
          btnFinalizar.style.cursor = "pointer";
        } else {
          btnFinalizar.disabled = true;
          btnFinalizar.style.opacity = "0.5";
          btnFinalizar.style.cursor = "not-allowed";
        }
      }
    }

    function finalizarExercicio() {
      let dadosRPG = JSON.parse(localStorage.getItem("rpg_dados_completos")) || {
        guerreiro: { level: 1, xp: 0, xpMax: 100 }
      };

      let guerreiro = dadosRPG.guerreiro;
      guerreiro.xp += exercicioAtual.xp;

      if (guerreiro.xp >= guerreiro.xpMax) {
        guerreiro.xp -= guerreiro.xpMax;
        guerreiro.level += 1;
        guerreiro.xpMax += 50;
        alert(`🎉 LEVEL UP! O Guerreiro alcançou o Nível ${guerreiro.level}!`);
      } else {
        alert(`⚔️ EXERCÍCIO CONCLUÍDO!\nVocê ganhou +${exercicioAtual.xp} XP!`);
      }

      localStorage.setItem("rpg_dados_completos", JSON.stringify(dadosRPG));
      window.location.href = "index.html";
    }

    // CRONÔMETRO DE DESCANSO TÁTICO (90s)
    function toggleTimer() {
      if (timerRodando) {
        pararTimer();
      } else {
        iniciarTimer();
      }
    }

    function iniciarTimer() {
      if (timerRodando) return;
      timerRodando = true;
      const btn = document.getElementById("btn-timer-toggle");
      btn.textContent = "Pausar";
      btn.style.backgroundColor = "var(--danger)";

      timerInterval = setInterval(() => {
        if (tempoRestante > 0) {
          tempoRestante--;
          atualizarDisplayTimer();
        } else {
          pararTimer();
          alert("⏱️ Fim do Descanso Tático! Próxima série na mira, Guerreiro!");
          resetarTimer();
        }
      }, 1000);
    }

    function pararTimer() {
      timerRodando = false;
      clearInterval(timerInterval);
      const btn = document.getElementById("btn-timer-toggle");
      if (btn) {
        btn.textContent = "Retomar";
        btn.style.backgroundColor = "var(--accent-color)";
      }
    }

    function resetarTimer() {
      pararTimer();
      tempoRestante = 90;
      atualizarDisplayTimer();
      const btn = document.getElementById("btn-timer-toggle");
      if (btn) {
        btn.textContent = "Iniciar Descanso";
      }
    }

    function atualizarDisplayTimer() {
      const minutos = Math.floor(tempoRestante / 60);
      const segundos = tempoRestante % 60;
      const display = document.getElementById("timer-display");
      if (display) {
        display.textContent = `${String(minutos).padStart(2, '0')}:${String(segundos).padStart(2, '0')}`;
      }
    }
  </script>
</body>
</html>
