<!-- IMPORTANDO O BANCO DE DADOS CORRETO -->
<script src="BDexercicio.js"></script>

  <script>
    let timerInterval = null;
    let tempoRestante = 90;
    let timerRodando = false;
    let exercicioAtual = null;

    document.addEventListener("DOMContentLoaded", () => {
      atualizarStatusUI();

      const urlParams = new URLSearchParams(window.location.search);
      let id = urlParams.get("id");

      if (typeof BD_EXERCICIOS === 'undefined') {
        console.error("Erro: O banco de dados BD_EXERCICIOS não foi carregado.");
        return;
      }

      if (!id || !BD_EXERCICIOS[id]) {
        alert("Exercício não encontrado!");
        window.location.href = "exercicio.html";
        return;
      }

      exercicioAtual = BD_EXERCICIOS[id];
      carregarDadosExercicio();
    });

    function carregarDadosExercicio() {
      if (!exercicioAtual) return;

      // Preenche textos básicos
      document.getElementById("ex-nome").textContent = exercicioAtual.nome || "Exercício";
      document.getElementById("ex-grupo").textContent = `Grupo Principal: ${exercicioAtual.grupo || "Geral"}`;
      document.getElementById("ex-xp").textContent = `+${exercicioAtual.xp || 50} XP Recompensa`;
      document.getElementById("ex-analise-texto").textContent = exercicioAtual.analise || "Sem análise técnica cadastrada.";

      // Configura o Vídeo com loop automático
      const videoEl = document.getElementById("ex-animacao");
      if (videoEl && exercicioAtual.animacao) {
        videoEl.src = exercicioAtual.animacao;
        videoEl.load();
        videoEl.play().catch(e => console.log("Autoplay bloqueado pelo navegador, necessita interação.", e));
      }

      // Músculos Primários
      const containerPrimario = document.getElementById("musculos-primarios");
      containerPrimario.innerHTML = "";
      if (exercicioAtual.musculosPrimarios) {
        exercicioAtual.musculosPrimarios.forEach(m => {
          containerPrimario.innerHTML += `<span class="badge-musculo primario"><span class="dot-red"></span>${m}</span>`;
        });
      }

      // Músculos Secundários
      const containerSecundario = document.getElementById("musculos-secundarios");
      containerSecundario.innerHTML = "";
      if (exercicioAtual.musculosSecundarios && exercicioAtual.musculosSecundarios.length > 0) {
        exercicioAtual.musculosSecundarios.forEach(m => {
          containerSecundario.innerHTML += `<span class="badge-musculo secundario"><span class="dot-yellow"></span>${m}</span>`;
        });
      } else {
        containerSecundario.innerHTML = `<span style="font-size: 0.85rem; color: var(--text-muted);">Nenhum músculo secundário relevante.</span>`;
      }

      // Gerar Séries
      const listaSeries = document.getElementById("lista-series");
      listaSeries.innerHTML = "";
      const totalSeries = exercicioAtual.series || 3;
      
      for (let i = 1; i <= totalSeries; i++) {
        listaSeries.innerHTML += `
          <div class="serie-item" onclick="toggleSerie(this)">
            <span>Série ${i} • Alvo: 10 a 12 Repetições</span>
            <input type="checkbox" class="check-serie" onclick="event.stopPropagation(); verificarProgresso()">
          </div>
        `;
      }
    }

    function toggleSerie(elemento) {
      const checkbox = elemento.querySelector(".check-serie");
      if (checkbox) {
        checkbox.checked = !checkbox.checked;
        verificarProgresso();
      }
    }

    function verificarProgresso() {
      const checkboxes = document.querySelectorAll(".check-serie");
      const total = checkboxes.length;
      let concluidas = 0;

      checkboxes.forEach(cb => {
        if (cb.checked) concluidas++;
      });

      const btnFinalizar = document.getElementById("btn-finalizar");
      if (concluidas === total && total > 0) {
        btnFinalizar.disabled = false;
        btnFinalizar.style.opacity = "1";
        btnFinalizar.style.cursor = "pointer";
      } else {
        btnFinalizar.disabled = true;
        btnFinalizar.style.opacity = "0.5";
        btnFinalizar.style.cursor = "not-allowed";
      }
    }

    function finalizarExercicios() {
      if (!exercicioAtual) return;

      let dadosRPG = JSON.parse(localStorage.getItem("rpg_dados_completos")) || {
        guerreiro: { level: 1, xp: 0, xpMax: 100 }
      };

      let ganhoXP = exercicioAtual.xp || 50;
      dadosRPG.guerreiro.xp += ganhoXP;

      // Sistema simples de level up
      if (dadosRPG.guerreiro.xp >= dadosRPG.guerreiro.xpMax) {
        dadosRPG.guerreiro.xp -= dadosRPG.guerreiro.xpMax;
        dadosRPG.guerreiro.level += 1;
        dadosRPG.guerreiro.xpMax = Math.floor(dadosRPG.guerreiro.xpMax * 1.2);
        alert(`🎉 PARABÉNS! SEU GUERREIRO SUBIU PARA O NÍVEL ${dadosRPG.guerreiro.level}!`);
      } else {
        alert(`🎯 Missão Cumprida! Você ganhou +${ganhoXP} XP.`);
      }

      localStorage.setItem("rpg_dados_completos", JSON.stringify(dadosRPG));
      window.location.href = "exercicio.html";
    }

    function atualizarStatusUI() {
      let dadosRPG = JSON.parse(localStorage.getItem("rpg_dados_completos")) || {
        guerreiro: { level: 1, xp: 0, xpMax: 100 }
      };
      let guerreiro = dadosRPG.guerreiro;
      const elLevel = document.getElementById("ui-level");
      if (elLevel) elLevel.textContent = `Nível ${guerreiro.level}`;
      
      const porcentagemXP = (guerreiro.xp / guerreiro.xpMax) * 100;
      const fillBar = document.getElementById("ui-xp-fill");
      if (fillBar) fillBar.style.width = `${Math.min(porcentagemXP, 100)}%`;
      
      const xpText = document.getElementById("ui-xp-text");
      if (xpText) xpText.textContent = `${guerreiro.xp} / ${guerreiro.xpMax} XP`;
    }

    function toggleTimer() {
      const btn = document.getElementById("btn-timer-toggle");
      if (timerRodando) {
        clearInterval(timerInterval);
        timerRodando = false;
        if (btn) {
          btn.textContent = "Retomar";
          btn.style.backgroundColor = "var(--accent-color)";
        }
      } else {
        timerRodando = true;
        if (btn) {
          btn.textContent = "Pausar";
          btn.style.backgroundColor = "var(--danger)";
        }
        timerInterval = setInterval(() => {
          if (tempoRestante > 0) {
            tempoRestante--;
            atualizarDisplayTimer();
          } else {
            clearInterval(timerInterval);
            timerRodando = false;
            alert("⏱️ Fim do Descanso Tático!");
            tempoRestante = 90;
            atualizarDisplayTimer();
            if (btn) {
              btn.textContent = "Iniciar Descanso";
              btn.style.backgroundColor = "var(--accent-color)";
            }
          }
        }, 1000);
      }
    }

    function atualizarDisplayTimer() {
      const min = Math.floor(tempoRestante / 60);
      const sec = tempoRestante % 60;
      const el = document.getElementById("timer-display");
      if (el) el.textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }
  </script>
