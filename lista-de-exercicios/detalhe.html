<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quartel de Missões • Detalhes da Missão</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container { width: 100%; max-width: 600px; }

    .status-card, .timer-card, .content-box {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .status-level { background-color: var(--accent-color); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
    .xp-bar-container { width: 100%; background-color: var(--border); border-radius: 8px; height: 12px; overflow: hidden; margin-top: 8px; }
    .xp-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); width: 0%; transition: width 0.4s ease; }
    .xp-text { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; text-align: right; }

    .timer-card { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
    .timer-display { font-size: 1.5rem; font-weight: bold; font-family: monospace; color: var(--success); }
    .btn-timer { background-color: var(--accent-color); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn-timer:hover { background-color: var(--accent-hover); }

    .exercise-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 4px; }
    .exercise-meta { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px; }

    .visual-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
    .visual-card { background-color: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .visual-card-title { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
    .exercise-media { width: 100%; max-height: 250px; object-fit: contain; border-radius: 6px; background-color: rgba(255, 255, 255, 0.02); }

    .section-subtitle { font-size: 1rem; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
    .badges-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .badge-musculo { font-size: 0.8rem; padding: 4px 10px; border-radius: 6px; font-weight: 500; }
    .badge-musculo.primario { background-color: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); }
    .badge-musculo.secundario { background-color: rgba(234, 179, 8, 0.2); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.4); }

    .analysis-text { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; background-color: rgba(0, 0, 0, 0.2); padding: 12px; border-radius: 8px; }

    .series-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .serie-item { display: flex; justify-content: space-between; align-items: center; background-color: rgba(255, 255, 255, 0.03); padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }
    .check-serie { width: 20px; height: 20px; cursor: pointer; }

    .btn-finalizar { width: 100%; background-color: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: bold; opacity: 0.5; cursor: not-allowed; transition: opacity 0.2s; }
  </style>
</head>
<body>

  <div class="container">
    <!-- STATUS DO GUERREIRO -->
    <div class="status-card">
      <div class="status-header">
        <span style="font-weight: 700;">⚔️ Status do Guerreiro</span>
        <span id="ui-level" class="status-level">Nível 1</span>
      </div>
      <div class="xp-bar-container"><div id="ui-xp-fill" class="xp-bar-fill"></div></div>
      <div id="ui-xp-text" class="xp-text">0 / 100 XP</div>
    </div>

    <!-- CRONÔMETRO -->
    <div class="timer-card">
      <div>
        <div style="font-size: 0.8rem; color: var(--text-muted);">Descanso Tático</div>
        <div id="timer-display" class="timer-display">01:30</div>
      </div>
      <button id="btn-timer-toggle" class="btn-timer" onclick="toggleTimer()">Iniciar Descanso</button>
    </div>

    <!-- CONTEÚDO DINÂMICO -->
    <div id="app-container" class="content-box">
      <!-- Inserido via JavaScript -->
    </div>
  </div>

        analise: "Coluna neutra e puxada direcionada ao umbigo para ganho de espessura.",

      },
      "remada-cavalinho": { 
        nome: "Remada Cavalinho ou T na Máquina",

      "rosca-direta-w": {

      "supino-inclinado-halteres": {

        series: ["Série 1: 10 reps", "Série 2: 10 reps", "Série 3: 8 reps", "Série 4: 8 reps"] 
      },
      "supino-reto": {

        musculos: { primarios: ["Peitoral Maior"], secundarios: ["Tríceps", "Deltoide Anterior"] },

      },
      "desenvolvimento-lateral": {

      "triceps-pulley": {

        musculos: { primarios: ["Tríceps Braquial"], secundarios: [] },

    let exercicioAtual = null;
    let timerInterval = null;
    let tempoRestante = 90;
    let timerRodando = false;

    document.addEventListener("DOMContentLoaded", () => {
      atualizarStatusUI();

      const urlParams = new URLSearchParams(window.location.search);
      let id = urlParams.get("id");
      const container = document.getElementById("app-container");

      if (!id || !BD_EXERCICIOS[id]) {
        id = "puxada-alta-aberta"; 
      }

      exercicioAtual = BD_EXERCICIOS[id];
      renderizarDetalhesExercicio(container);
    });

    function atualizarStatusUI() {
      let dadosRPG = JSON.parse(localStorage.getItem("rpg_dados_completos")) || {
        guerreiro: { level: 1, xp: 0, xpMax: 100 }
      };
      let guerreiro = dadosRPG.guerreiro;
      document.getElementById("ui-level").textContent = `Nível ${guerreiro.level}`;
      const porcentagemXP = (guerreiro.xp / guerreiro.xpMax) * 100;
      document.getElementById("ui-xp-fill").style.width = `${Math.min(porcentagemXP, 100)}%`;
      document.getElementById("ui-xp-text").textContent = `${guerreiro.xp} / ${guerreiro.xpMax} XP`;
    }

    function renderizarDetalhesExercicio(container) {
      container.innerHTML = `
        <h2 class="exercise-title">${exercicioAtual.nome}</h2>
        <p class="exercise-meta">${exercicioAtual.grupo}</p>
        <p style="font-size: 0.85rem; color: var(--success); font-weight: bold; margin-bottom: 15px;">+${exercicioAtual.xp} XP Recompensa</p>

        <div class="visual-grid">
          <div class="visual-card">
            <span class="visual-card-title">🎬 Demonstração de Execução</span>
            <img src="${exercicioAtual.gif}" class="exercise-media" alt="Execução do Exercício">
          </div>
        </div>

        <h3 class="section-subtitle">Músculos Envolvidos</h3>
        <div class="badges-container">
          ${exercicioAtual.musculos.primarios.map(m => `<span class="badge-musculo primario">🔴 ${m}</span>`).join("")}
        </div>
        <div class="badges-container">
          ${exercicioAtual.musculos.secundarios.map(m => `<span class="badge-musculo secundario">🟡 ${m}</span>`).join("")}
        </div>

        <h3 class="section-subtitle">Análise Técnica</h3>
        <div class="analysis-text">${exercicioAtual.analise}</div>

        <h3 class="section-subtitle">Controle de Séries</h3>
        <div class="series-list">
          ${exercicioAtual.series.map(textoSerie => `
            <label class="serie-item">
              <span>${textoSerie}</span>
              <input type="checkbox" class="check-serie" onchange="verificarConclusao()">
            </label>
          `).join("")}
        </div>

        <button id="btn-finalizar" class="btn-finalizar" onclick="finalizarExercicio()" disabled>Concluir Missão</button>
        
        <div style="margin-top: 15px; text-align: center;">
          <a href="index.html" style="color: var(--accent-color); text-decoration: none; font-size: 0.9rem;">← Voltar para a Agenda</a>
        </div>
      `;
    }

    function verificarConclusao() {
      const checkboxes = document.querySelectorAll(".check-serie");
      if (checkboxes.length === 0) return;
      const todasConcluidas = Array.from(checkboxes).every(cb => cb.checked);
      const btnFinalizar = document.getElementById("btn-finalizar");

      if (btnFinalizar) {
        if (todasConcluidas) {
          btnFinalizar.disabled = false;
          btnFinalizar.style.opacity = "1";
          btnFinalizar.style.cursor = "pointer";
        } else {
          btnFinalizar.disabled = true;
          btnFinalizar.style.opacity = "0.5";
          btnFinalizar.style.cursor = "not-allowed";
        }
      }
    }

    function finalizarExercicio() {
      let dadosRPG = JSON.parse(localStorage.getItem("rpg_dados_completos")) || {
        guerreiro: { level: 1, xp: 0, xpMax: 100 }
      };

      let guerreiro = dadosRPG.guerreiro;
      guerreiro.xp += exercicioAtual.xp;

      if (guerreiro.xp >= guerreiro.xpMax) {
        guerreiro.xp -= guerreiro.xpMax;
        guerreiro.level += 1;
        guerreiro.xpMax += 50;
        alert(`🎉 LEVEL UP! O Guerreiro alcançou o Nível ${guerreiro.level}!`);
      } else {
        alert(`⚔️ EXERCÍCIO CONCLUÍDO!\nVocê ganhou +${exercicioAtual.xp} XP!`);
      }

      localStorage.setItem("rpg_dados_completos", JSON.stringify(dadosRPG));
      window.location.href = "index.html";
    }

    function toggleTimer() {
      if (timerRodando) {
        clearInterval(timerInterval);
        timerRodando = false;
        document.getElementById("btn-timer-toggle").textContent = "Retomar";
      } else {
        timerRodando = true;
        document.getElementById("btn-timer-toggle").textContent = "Pausar";
        document.getElementById("btn-timer-toggle").style.backgroundColor = "var(--danger)";
        timerInterval = setInterval(() => {
          if (tempoRestante > 0) {
            tempoRestante--;
            atualizarDisplayTimer();
          } else {
            clearInterval(timerInterval);
            timerRodando = false;
            alert("⏱️ Fim do Descanso Tático!");
            tempoRestante = 90;
            atualizarDisplayTimer();
            document.getElementById("btn-timer-toggle").textContent = "Iniciar Descanso";
            document.getElementById("btn-timer-toggle").style.backgroundColor = "var(--accent-color)";
          }
        }, 1000);
      }
    }

    function atualizarDisplayTimer() {
      const min = Math.floor(tempoRestante / 60);
      const sec = tempoRestante % 60;
      const el = document.getElementById("timer-display");
      if (el) el.textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }
  </script>
</body>
</html>
