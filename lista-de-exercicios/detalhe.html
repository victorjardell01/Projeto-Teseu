<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missão de Treino - Discipline RPG</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container-detalhe {
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }

    .card-missao {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 20px;
      margin-top: 15px;
    }

    .gif-container {
      width: 100%;
      height: 250px;
      background: #1f1f1f;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid #333;
    }

    .gif-container img {
      max-height: 100%;
      object-fit: contain;
    }

    .badge-grupo {
      display: inline-block;
      background: rgba(0, 255, 204, 0.15);
      color: #00ffcc;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .secao-musculos {
      margin: 15px 0;
    }

    .secao-musculos h4 {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    .badges-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge-musculo {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .badge-musculo.primario {
      background: rgba(255, 75, 75, 0.2);
      border: 1px solid rgba(255, 75, 75, 0.4);
      color: #ff6b6b;
    }

    .badge-musculo.secundario {
      background: rgba(255, 193, 7, 0.15);
      border: 1px solid rgba(255, 193, 7, 0.3);
      color: #ffc107;
    }

    .lista-series {
      margin: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .serie-item {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 12px 15px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .check-serie {
      width: 20px;
      height: 20px;
      accent-color: #00ffcc;
      cursor: pointer;
    }

    .btn-finalizar {
      width: 100%;
      background: #00ffcc;
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      cursor: not-allowed;
      opacity: 0.5;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container-detalhe">
    <a href="exercicio.html" style="color: #888; text-decoration: none; font-size: 0.9rem;">⬅ Voltar ao Quartel</a>

    <div class="card-missao">
      <span id="ex-grupo" class="badge-grupo">Carregando...</span>
      <h2 id="ex-nome" style="color: #fff; margin: 0 0 5px 0;">Carregando Exercício...</h2>
      <p id="ex-xp" style="color: #00ffcc; font-weight: bold; font-size: 0.9rem; margin-bottom: 15px;">+0 XP Recompensa</p>

      <!-- Animação do Boneco / Exercício -->
      <div class="gif-container">
        <img id="ex-animacao" src="" alt="Animação do Exercício">
      </div>

      <!-- Análise e Postura -->
      <div style="background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 3px solid #00ffcc;">
        <h4 style="margin: 0 0 5px 0; font-size: 0.9rem; color: #fff;">💡 Dica de Execução</h4>
        <p id="ex-analise-texto" style="margin: 0; font-size: 0.85rem; color: #bbb;"></p>
      </div>

      <!-- Músculos Afetados -->
      <div class="secao-musculos">
        <h4>🔴 Músculos Primários (Foco Principal)</h4>
        <div id="musculos-primarios" class="badges-container"></div>
      </div>

      <div class="secao-musculos">
        <h4>🟡 Músculos Secundários (Estabilizadores e Apoio)</h4>
        <div id="musculos-secundarios" class="badges-container"></div>
      </div>

      <!-- Séries -->
      <h4 style="color: #aaa; font-size: 0.95rem; margin-top: 20px;">Checklist de Séries</h4>
      <div id="lista-series" class="lista-series">
        <!-- Preenchido via JS -->
      </div>

      <!-- Botão de Conclusão -->
      <button id="btn-finalizar" class="btn-finalizar" disabled onclick="finalizarExercicios()">Completar Missão ⚔️</button>
    </div>
  </div>

  <!-- Scripts: Carrega o Banco de Dados primeiro e depois a lógica -->
  <script src="BDexercicio.js"></script>
  <script src="app.js"></script>
</body>
</html>
