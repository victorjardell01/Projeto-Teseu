<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quartel de Missões • Detalhes do Exercício</title>
  <style>
    :root {
      --bg-color: #0a0a0a;
      --card-bg: #141414;
      --accent-color: #00ffcc;
      --accent-hover: #00cca3;
      --text-main: #f8fafc;
      --text-muted: #888;
      --border: #222;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container { width: 100%; max-width: 600px; }

    .voltar-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      display: inline-block;
      margin-bottom: 15px;
    }
    .voltar-link:hover { color: var(--text-main); }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h2#ex-nome {
      color: #fff;
      font-size: 1.3rem;
      margin-bottom: 5px;
    }

    .meta-info {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 15px;
    }

    .media-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .visual-card {
      background: #121218;
      border: 1px solid #2a2a3d;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .visual-card-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .exercise-media {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 6px;
      background: #000;
    }

    .musculos-box {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
    }

    .badge-musculo {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
    }
    .badge-musculo.primario { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }
    .badge-musculo.secundario { background: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid #eab308; }

    .series-lista {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .serie-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #181820;
      border: 1px solid #2a2a3d;
      padding: 12px 15px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .check-serie {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-color);
      cursor: pointer;
    }

    .btn-atacar {
      width: 100%;
      background: var(--accent-color);
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      cursor: not-allowed;
      opacity: 0.5;
      transition: all 0.2s ease;
    }

    .btn-atacar.ativo {
      cursor: pointer;
      opacity: 1;
    }

    .analise-box {
      font-size: 0.85rem;
      color: #aaa;
      line-height: 1.4;
      background: #121218;
      padding: 12px;
      border-radius: 6px;
      border-left: 3px solid var(--accent-color);
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="exercicio.html" class="voltar-link">⬅ Voltar ao Quartel de Missões</a>

    <div class="card">
      <h2 id="ex-nome">Carregando Missão...</h2>
      <div class="meta-info">
        <span id="ex-grupo">Músculo Alvo: --</span> • <span id="ex-xp" style="color: var(--accent-color); font-weight: bold;">-- XP</span>
      </div>

      <div class="media-container">
        <div class="visual-card">
          <span class="visual-card-title">🎥 Execução Tática</span>
          <video id="ex-animacao" class="exercise-media" autoplay loop muted playsinline></video>
        </div>
        <div class="visual-card">
          <span class="visual-card-title">🗺️ Mapa Muscular</span>
          <img id="ex-mapa" class="exercise-media" alt="Mapa Muscular" />
        </div>
      </div>

      <div class="analise-box" id="ex-analise-texto">
        Carregando diretrizes de combate...
      </div>

      <div class="musculos-box" id="musculos-primarios"></div>
      <div class="musculos-box" id="musculos-secundarios"></div>

      <h3 style="font-size: 0.95rem; margin-bottom: 10px; color: #fff;">⚔️ Progresso das Séries</h3>
      <div class="series-lista" id="lista-series"></div>

      <button id="btn-finalizar" class="btn-atacar" disabled onclick="finalizarMissao()">Completar Missão ⚔️</button>
    </div>
  </div>

  <!-- A ordem dos scripts importa: primeiro o banco, depois a lógica -->
  <script src="BDexercicio.js"></script>
  <script src="exercicio.js"></script>
</body>
</html>
