<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício - Discipline RPG</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .exercicio-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 20px;
      margin-top: 15px;
    }

    /* Container da Animação/GIF */
    .animacao-box {
      width: 100%;
      height: 220px;
      background: #000;
      border: 1px solid #222;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      margin-top: 15px;
    }

    .animacao-box img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    /* Badges de Músculos */
    .musculos-box {
      margin-top: 12px;
    }

    .musculos-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .badge-musculo {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
    }

    .badge-musculo.primario {
      background: rgba(255, 51, 51, 0.15);
      color: #ff4d4d;
      border: 1px solid #ff4d4d;
    }

    .badge-musculo.secundario {
      background: rgba(255, 204, 0, 0.15);
      color: #ffcc00;
      border: 1px solid #ffcc00;
    }

    /* Caixa de Dica / Análise */
    .analise-box {
      background: #0d0d0d;
      border-left: 3px solid #00ffcc;
      padding: 12px;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #ccc;
      margin-top: 15px;
      line-height: 1.4;
    }

    /* Lista de Séries */
    .series-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 15px 0;
    }

    .serie-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0d0d0d;
      padding: 12px 15px;
      border-radius: 6px;
      border: 1px solid #222;
      cursor: pointer;
    }

    .serie-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #00ffcc;
      cursor: pointer;
    }

    /* Botão Finalizar */
    .btn-concluir-treino {
      width: 100%;
      padding: 14px;
      background: #00ffcc;
      color: #000;
      border: none;
      font-weight: bold;
      font-size: 1rem;
      border-radius: 6px;
      cursor: not-allowed;
      opacity: 0.5;
      transition: all 0.2s ease;
    }
  </style>
</head>
<body>

  <div class="page active" style="padding: 20px; max-width: 500px; margin: 0 auto;">
    <a href="../index.html" style="color: #888; text-decoration: none; font-size: 0.9rem;">⬅ Voltar ao Dashboard</a>

    <!-- Header do Exercício -->
    <div style="margin-top: 15px;">
      <div id="ex-xp" style="display: inline-block; background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 1px solid #00ffcc; padding: 4px 10px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px;">+0 XP</div>
      <h2 id="ex-nome" style="color: #fff; border-left: 3px solid #00ffcc; padding-left: 10px; margin: 0;">Carregando...</h2>
      <p id="ex-grupo" style="color: #888; margin-top: 5px; font-size: 0.9rem;"></p>
    </div>

    <!-- Animação / Demonstração -->
    <div class="animacao-box">
      <img id="ex-animacao" src="" alt="Demonstração do exercício">
    </div>

    <!-- Análise Muscular e Dica Técnica -->
    <div class="exercicio-card">
      <h3 style="color: #00ffcc; font-size: 0.95rem; margin-top: 0;">🎯 Análise de Ativação</h3>
      
      <div class="musculos-box">
        <p style="font-size: 0.8rem; color: #888; margin: 0;">Músculos Primários:</p>
        <div id="musculos-primarios" class="musculos-group"></div>
      </div>

      <div class="musculos-box">
        <p style="font-size: 0.8rem; color: #888; margin: 8px 0 0 0;">Músculos Secundários:</p>
        <div id="musculos-secundarios" class="musculos-group"></div>
      </div>

      <div class="analise-box">
        <strong>💡 Dica do Mestre:</strong> <span id="ex-analise-texto">...</span>
      </div>
    </div>

    <!-- Lista de Checkboxes das Séries -->
    <div class="exercicio-card">
      <h3 style="color: #00ffcc; font-size: 0.95rem; margin: 0 0 10px 0;">Séries Executadas</h3>
      
      <div id="lista-series" class="series-list"></div>

      <button id="btn-finalizar" class="btn-concluir-treino" onclick="finalizarExercicios()" disabled>
        Concluir Exercício
      </button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
