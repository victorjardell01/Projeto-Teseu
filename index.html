<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discipline RPG</title>
  <!-- É ESTA LINHA QUE PUXA O VISUAL CYBERPUNK -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main-container">

    <!-- TELA DE LOGIN -->
    <section id="screen-login" class="screen">
      <div class="card-login">
        <span class="logo-icon">🛡️</span>
        <h1>Discipline RPG</h1>
        <p>Digite sua senha para acessar sua jornada</p>
        
        <form id="form-login" onsubmit="autenticarUsuario(event)">
          <div class="input-group">
            <input 
              type="password" 
              id="input-password" 
              placeholder="Sua senha secreta" 
              required 
            />
          </div>
          <button type="submit" class="btn-primary">Entrar no Reino</button>
        </form>
      </div>
    </section>

    <!-- TELA DE SELEÇÃO -->
    <section id="screen-avatars" class="screen hidden">
      <header class="header-selecao">
        <h2>Escolha seu Campeão</h2>
        <p>Selecione a área que deseja evoluir hoje</p>
      </header>

      <div class="grid-avatars">
        
        <!-- GUERREIRO -->
        <div class="card-avatar-select" onclick="entrarComoClasse('guerreiro')">
          <div class="badge-level" id="lvl-guerreiro">Lvl 1</div>
          <div class="avatar-frame">
            <img src="https://api.dicebear.com/7.x/micah/svg?seed=Guerreiro&backgroundColor=141414" alt="Guerreiro">
          </div>
          <h3>Guerreiro</h3>
          <span class="foco-tag">💪 Treino</span>
        </div>

        <!-- MAGO -->
        <div class="card-avatar-select" onclick="entrarComoClasse('mago')">
          <div class="badge-level" id="lvl-mago">Lvl 1</div>
          <div class="avatar-frame">
            <img src="https://api.dicebear.com/7.x/micah/svg?seed=Mago&backgroundColor=141414" alt="Mago">
          </div>
          <h3>Mago</h3>
          <span class="foco-tag">🧠 Mente</span>
        </div>

        <!-- CLÉRIGO -->
        <div class="card-avatar-select" onclick="entrarComoClasse('clerigo')">
          <div class="badge-level" id="lvl-clerigo">Lvl 1</div>
          <div class="avatar-frame">
            <img src="https://api.dicebear.com/7.x/micah/svg?seed=Clerigo&backgroundColor=141414" alt="Clérigo">
          </div>
          <h3>Clérigo</h3>
          <span class="foco-tag">✨ Alma</span>
        </div>

        <!-- DRUIDA -->
        <div class="card-avatar-select" onclick="entrarComoClasse('druida')">
          <div class="badge-level" id="lvl-druida">Lvl 1</div>
          <div class="avatar-frame">
            <img src="https://api.dicebear.com/7.x/micah/svg?seed=Druida&backgroundColor=141414" alt="Druida">
          </div>
          <h3>Druida</h3>
          <span class="foco-tag">🍃 Alimentação</span>
        </div>

      </div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
