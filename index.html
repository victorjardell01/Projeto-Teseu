<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discipline RPG</title>
  <!-- Verifique se o arquivo style.css está exatamente na mesma pasta deste arquivo HTML -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- DASHBOARD PRINCIPAL -->
  <div class="container">
    
    <!-- CARD DO PERSONAGEM -->
    <div class="card-personagem">
      <!-- Clicar na imagem abre a seleção de classe -->
      <div class="avatar-box" onclick="abrirSeletorClasses()">
        <img id="avatar-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=Aventureiro" alt="Seu Personagem">
        <span class="badge-nivel" id="char-level">Lvl 1</span>
      </div>
      
      <h2 id="char-name">Aventureiro</h2>
      <p id="char-class-title" class="classe-label">Clique no avatar para escolher a classe</p>
      
      <!-- BARRA DE XP -->
      <div class="xp-bar-container">
        <div class="xp-bar-fill" id="xp-fill" style="width: 0%;"></div>
      </div>
      <p class="xp-text" id="xp-text">0 / 100 XP</p>
    </div>

    <!-- MODAL / SELETOR DE CLASSES -->
    <div id="modal-classes" class="modal hidden">
      <div class="modal-content">
        <h3>Escolha seu Caminho:</h3>
        
        <div class="grid-classes">
          <!-- GUERREIRO -> TREINO -->
          <div class="card-classe guerreiro" onclick="selecionarClasse('guerreiro')">
            <span class="icone-classe">⚔️</span>
            <h4>Guerreiro</h4>
            <p>Foco: Treino e Força</p>
          </div>

          <!-- MAGO -> MENTE -->
          <div class="card-classe mago" onclick="selecionarClasse('mago')">
            <span class="icone-classe">🧙‍♂️</span>
            <h4>Mago</h4>
            <p>Foco: Mente e Estudos</p>
          </div>

          <!-- CLÉRIGO -> ALMA -->
          <div class="card-classe clerigo" onclick="selecionarClasse('clerigo')">
            <span class="icone-classe">✨</span>
            <h4>Clérigo</h4>
            <p>Foco: Alma e Meditação</p>
          </div>

          <!-- DRUIDA -> ALIMENTAÇÃO -->
          <div class="card-classe druida" onclick="selecionarClasse('druida')">
            <span class="icone-classe">🍃</span>
            <h4>Druida</h4>
            <p>Foco: Alimentação e Saúde</p>
          </div>
        </div>

        <button class="btn-fechar" onclick="fecharSeletorClasses()">Fechar</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
